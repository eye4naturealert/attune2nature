name: Daily EyeForNature Run

on:
  schedule:
    - cron: "0 10 * * *"  # 6am EST = 10am UTC
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests geopandas pandas shapely

      - name: Run script
        run: |
          python attune.py
